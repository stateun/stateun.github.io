<!-- MathJax 설정 -->
<script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      extensions: ["tex2jax.js"],
      jax: ["input/TeX", "output/HTML-CSS"],
      tex2jax: {
        inlineMath: [ ["$", "$"], ["\\(", "\\)"] ],
        displayMath: [ ["$$", "$$"], ["\\[", "\\]"] ],
        processEscapes: true
      },
      "HTML-CSS": { availableFonts: ["TeX"] }
    });
  </script>
  
  <!-- MathJax 스크립트 로드 (CDN) -->
  <script

  </script>
